# Render Blueprint — deploys the TaskForge API + a managed Redis.
# The PostgreSQL database is external (Neon, durable free tier): you paste its
# connection string into DATABASE_URL when you click "Apply" in Render.
#
# Everything else (JWT/cookie secrets, Redis wiring) is generated automatically.
# One-click: Render dashboard → New → Blueprint → connect taskforge-saas → Apply.

services:
  # ---- Managed Redis (sessions, rate limiting, presence, queues) ----
  - type: keyvalue
    name: taskforge-redis
    plan: free
    region: oregon
    ipAllowList: [] # internal-only; reachable by the API service

  # ---- Express API (REST + Socket.IO realtime) ----
  - type: web
    name: taskforge-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    # prisma generate must precede the backend tsc build (it imports the client)
    buildCommand: >-
      npm install --include=dev &&
      npm --prefix apps/backend run prisma:generate &&
      npm run build:packages &&
      npm run build:backend
    # migrate + (idempotent) seed, then boot the compiled server
    startCommand: >-
      npm --prefix apps/backend run prisma:deploy &&
      npm --prefix apps/backend run prisma:seed &&
      node apps/backend/dist/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # Paste your Neon (or any Postgres) connection string on Apply:
      - key: DATABASE_URL
        sync: false
      # Wired automatically from the Redis service above:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: taskforge-redis
          property: connectionString
      # Secrets generated by Render (>= 32 chars):
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      # Cross-site cookies: the web app is on a different domain (Vercel).
      - key: COOKIE_SAMESITE
        value: none
      - key: CORS_ORIGINS
        value: https://taskforge-saas.vercel.app
      - key: APP_URL
        value: https://taskforge-saas.vercel.app
      # Seed the demo workspace + a ready-to-use demo login as well:
      - key: SEED_DEMO
        value: 'true'
