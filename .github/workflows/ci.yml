name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  test:
    name: Typecheck, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskforge
          POSTGRES_PASSWORD: taskforge_ci
          POSTGRES_DB: taskforge
        ports: ['5433:5432']
        options: >-
          --health-cmd "pg_isready -U taskforge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build shared packages
        run: npm run build:packages

      - name: Generate Prisma client
        run: npx prisma generate --schema apps/backend/prisma/schema.prisma

      - name: Typecheck backend
        run: npx tsc --noEmit -p apps/backend/tsconfig.json

      - name: Typecheck frontend
        run: npx tsc --noEmit -p apps/frontend/tsconfig.json

      - name: Unit + integration tests
        env:
          TEST_DATABASE_URL: postgresql://taskforge:taskforge_ci@localhost:5433/taskforge?schema=tests
        run: npm test --workspace=@taskforge/backend

      - name: Shared utils tests
        run: npm test --workspace=@taskforge/shared-utils

      - name: Build backend
        run: npm run build --workspace=@taskforge/backend

      - name: Build frontend
        run: npm run build --workspace=@taskforge/frontend

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
